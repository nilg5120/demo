<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>履歴書</title>
    <style>
        body {
            font-family: 'Arial', sans-serif;
            padding: 30px;
            width: 600px;
            border: 1px solid #000;
            margin: 0 auto;
        }
        .header {
            display: flex;
            justify-content: space-between;
        }
        .profile-picture {
            width: 100px;
            height: 130px;
            border: 1px solid #000;
            margin-left: 30px;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 30px;
        }
        th, td {
            border: 1px solid #000;
            padding: 5px;
        }
        th {
            background-color: #eee;
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>履歴書</h1>
        <div class="profile-picture">
            <img src="path_to_image" alt="Profile" width="100%">
        </div>
    </div>
    <p>名前: たろう</p>
    <table>
        <thead>
            <tr>
                <th>年月</th>
                <th>学歴・職歴</th>
            </tr>
        </thead>
        <tbody>
            <tr>
                <td>平成18年4月</td>
                <td>○○大学入学</td>
            </tr>
            <!-- 他の行も同様に追加 -->
        </tbody>
    </table>

    <!-- 他のセクションも同様に追加 -->

</body>
</html>
